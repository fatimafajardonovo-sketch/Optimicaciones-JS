<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightbox con JS</title>
    <link rel="stylesheet" href="./css/lightbox.css">
    <script defer src="./js/lightbox.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    <h1> Simba Gallery: Efecto Lighthouse </h1>
    <div class="grid">
        <img class="img" src="./media/UXJK7793.JPG" alt="Imagen 0">
        <img class="img" src="./media/UYTQ2554.JPG" alt="Imagen 1">
        <img class="img" src="./media/XRRI9696 - copia.JPG" alt="Imagen 2">
    </div>
    <div class="lightbox">
        <button class="close"><i class="ri-close-line svg"></i></button>
        <img class="grande" src="" alt="imagen grande">
    </div>
</body>
</html>
